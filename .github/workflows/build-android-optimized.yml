name: Android Build (Stable & Optimized)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ANDROID_HOME: C:\android-sdk
  NDK_VERSION: r14b

jobs:
  build:
    name: Build APK
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ---------- 1. Установка Android SDK ----------
      - name: Install Android SDK Command-line Tools
        run: |
          mkdir C:\android-sdk
          cd C:\android-sdk
          curl -L -o sdk-tools.zip https://dl.google.com/android/repository/commandlinetools-win-11076708_latest.zip
          7z x sdk-tools.zip -oC:\android-sdk
          del sdk-tools.zip
          # Принимаем лицензии
          echo y | C:\android-sdk\cmdline-tools\bin\sdkmanager.bat --licenses
          # Устанавливаем необходимые платформы и инструменты (если нужно)
          C:\android-sdk\cmdline-tools\bin\sdkmanager.bat "platform-tools" "platforms;android-29"
        shell: pwsh

      # ---------- 2. Кеш NDK ----------
      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: C:\android-ndk-${{ env.NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}

      - name: Download and extract NDK (if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-$env:NDK_VERSION-windows-x86_64.zip
          mkdir C:\android-ndk-$env:NDK_VERSION
          7z x ndk.zip -oC:\
          del ndk.zip
        shell: pwsh

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=C:\android-ndk-$env:NDK_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "C:\android-ndk-$env:NDK_VERSION" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      # ---------- 3. Кеш Gradle ----------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~\.gradle\caches
            ~\.gradle\wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---------- 4. Исправление Android.mk (перманентное) ----------
      # В идеале, этот шаг нужно заменить на прямое исправление файла в репозитории.
      # Но пока он здесь, он делает сборку более стабильной.
      - name: Patch Android.mk – add missing TextBox.cpp
        shell: pwsh
        run: |
          $mkPath = "android/jni/Android.mk"
          if (-not (Test-Path $mkPath)) {
            Write-Host "Файл $mkPath не найден, пропускаем патч."
            exit 0
          }
          Write-Host "=== Содержимое Android.mk ДО патча ==="
          Get-Content $mkPath

          $content = Get-Content $mkPath -Raw
          if ($content -match "TextBox\.cpp") {
            Write-Host "TextBox.cpp уже присутствует в Android.mk."
          } else {
            Write-Host "Добавляем TextBox.cpp в LOCAL_SRC_FILES..."
            $lines = Get-Content $mkPath
            $newLines = @()
            $inserted = $false
            for ($i = 0; $i -lt $lines.Count; $i++) {
              $line = $lines[$i]
              $newLines += $line
              if ($line -match "^\s*LOCAL_SRC_FILES\s*[+:]?=" -and -not $inserted) {
                $newLines += "LOCAL_SRC_FILES += ../../../src/client/gui/components/TextBox.cpp"
                $inserted = $true
              }
            }
            if (-not $inserted) {
              $newLines += ""
              $newLines += "LOCAL_SRC_FILES += ../../../src/client/gui/components/TextBox.cpp"
            }
            Set-Content $mkPath -Value $newLines
            Write-Host "Android.mk обновлён."
          }

          Write-Host "=== Содержимое Android.mk ПОСЛЕ патча ==="
          Get-Content $mkPath

      # ---------- 5. Сборка ----------
      - name: Build with PowerShell script
        shell: pwsh
        run: |
          # Проверяем наличие build.ps1
          if (-not (Test-Path ".\build.ps1")) {
            Write-Error "build.ps1 not found!"
            exit 1
          }
          # Запускаем сборку. Важно, чтобы скрипт возвращал ошибку при провале.
          .\build.ps1
        env:
          ANDROID_HOME: C:\android-sdk
          ANDROID_NDK_HOME: C:\android-ndk-${{ env.NDK_VERSION }}

      # ---------- 6. Загрузка артефакта ----------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mcpe-android-apk
          path: |
            **/*.apk
            **/outputs/**/*.apk
