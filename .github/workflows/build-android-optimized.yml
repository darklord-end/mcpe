name: Ultimate MCPE Android Build

on:
  workflow_dispatch:          # ручной запуск
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ANDROID_HOME: C:\android-sdk
  ANDROID_NDK_HOME: C:\android-ndk-r14b

jobs:
  build:
    name: Build APK
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Устанавливаем JDK – без кеширования Gradle (т.к. его нет)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          # cache: не указываем – проект не использует Gradle

      # Кешируем NDK r14b (экономит ~5 минут)
      - name: Cache Android NDK r14b
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: C:\android-ndk-r14b
          key: ${{ runner.os }}-ndk-r14b-${{ hashFiles('**/Android.mk') }}
          restore-keys: |
            ${{ runner.os }}-ndk-r14b-

      - name: Download NDK r14b (if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-r14b-windows-x86_64.zip
          7z x ndk.zip -oC:\
          del ndk.zip

      # Кешируем SDK (компоненты)
      - name: Cache Android SDK components
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: C:\android-sdk
          key: ${{ runner.os }}-sdk-${{ hashFiles('**/AndroidManifest.xml') }}
          restore-keys: |
            ${{ runner.os }}-sdk-

      # Устанавливаем SDK, если не закешировано
      - name: Install Android SDK (if not cached)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:ANDROID_HOME\cmdline-tools" | Out-Null
          curl -L -o sdk-tools.zip https://dl.google.com/android/repository/commandlinetools-win-11076708_latest.zip
          7z x sdk-tools.zip -o"$env:ANDROID_HOME\cmdline-tools\" | Out-Null
          if (Test-Path "$env:ANDROID_HOME\cmdline-tools\cmdline-tools") {
              Move-Item "$env:ANDROID_HOME\cmdline-tools\cmdline-tools" "$env:ANDROID_HOME\cmdline-tools\latest" -Force
          }
          $sdkManager = "$env:ANDROID_HOME\cmdline-tools\latest\bin\sdkmanager.bat"
          if (-not (Test-Path $sdkManager)) {
              Write-Error "sdkmanager.bat not found!"
              exit 1
          }
          echo y | & $sdkManager --sdk_root="$env:ANDROID_HOME" --licenses 2>&1 | Out-Null
          & $sdkManager --sdk_root="$env:ANDROID_HOME`" "platform-tools" "platforms;android-29" "build-tools;35.0.0" 2>&1 | Out-Null
          Write-Host "Android SDK installed successfully."

      # Основная сборка (использует улучшенный build.ps1)
      - name: Build APK
        shell: pwsh
        run: .\build.ps1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # Загружаем готовый APK как артефакт
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mcpe-android-apk
          path: |
            build/apk/*.apk
            project/android/bin/*.apk
          if-no-files-found: error

      # Информация о собранных файлах
      - name: Display build info
        run: |
          echo "Build completed at $(Get-Date)"
          Get-ChildItem build/apk -Recurse | Select-Object Name, Length, LastWriteTime
        shell: pwsh
