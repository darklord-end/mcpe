name: Android Build (Final Fix & Optimized)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ANDROID_HOME: C:\android-sdk
  NDK_VERSION: r14b

jobs:
  build:
    name: Build APK
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ---------- Кеш NDK ----------
      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: C:\android-ndk-${{ env.NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}

      - name: Download and extract NDK (if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-$env:NDK_VERSION-windows-x86_64.zip
          mkdir C:\android-ndk-$env:NDK_VERSION
          7z x ndk.zip -oC:\
          del ndk.zip
        shell: pwsh

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=C:\android-ndk-$env:NDK_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "C:\android-ndk-$env:NDK_VERSION" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      # ---------- Кеш Gradle ----------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~\.gradle\caches
            ~\.gradle\wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---------- ИСПРАВЛЕНИЕ: добавляем TextBox.cpp в Android.mk ----------
      - name: Patch Android.mk – add missing TextBox.cpp
        shell: pwsh
        run: |
          $mkPath = "android/jni/Android.mk"
          if (-not (Test-Path $mkPath)) {
            Write-Host "Файл $mkPath не найден, пропускаем патч."
            exit 0
          }

          Write-Host "=== Содержимое Android.mk ДО патча ==="
          Get-Content $mkPath

          # Проверяем, есть ли уже TextBox.cpp
          $content = Get-Content $mkPath -Raw
          if ($content -match "TextBox\.cpp") {
            Write-Host "TextBox.cpp уже присутствует в Android.mk."
          } else {
            Write-Host "Добавляем TextBox.cpp в LOCAL_SRC_FILES..."

            # Ищем строку, где начинается перечень LOCAL_SRC_FILES
            # В типичном файле это выглядит как "LOCAL_SRC_FILES := ..." или "LOCAL_SRC_FILES += ..."
            # Мы просто добавим новую строку в конец файла, но перед include или в конце секции.
            # Лучше вставить после последнего упоминания LOCAL_SRC_FILES.
            $lines = Get-Content $mkPath
            $newLines = @()
            $inserted = $false
            for ($i = 0; $i -lt $lines.Count; $i++) {
              $line = $lines[$i]
              $newLines += $line
              # Если нашли строку, начинающуюся с LOCAL_SRC_FILES и она не закомментирована
              if ($line -match "^\s*LOCAL_SRC_FILES\s*[+:]?=" -and -not $inserted) {
                # Добавим наш файл в следующей строке (чтобы не нарушить синтаксис)
                # Иногда список разбит на несколько строк с обратными слэшами, мы просто добавим новую строку с +=
                $newLines += "LOCAL_SRC_FILES += ../../../src/client/gui/components/TextBox.cpp"
                $inserted = $true
              }
            }
            # Если не вставили (не нашли LOCAL_SRC_FILES), добавим в конец
            if (-not $inserted) {
              $newLines += ""
              $newLines += "LOCAL_SRC_FILES += ../../../src/client/gui/components/TextBox.cpp"
            }
            Set-Content $mkPath -Value $newLines
            Write-Host "Android.mk обновлён."
          }

          Write-Host "=== Содержимое Android.mk ПОСЛЕ патча ==="
          Get-Content $mkPath

      # ---------- Сборка ----------
      - name: Build with PowerShell script
        shell: pwsh
        run: |
          .\build.ps1
        env:
          ANDROID_HOME: C:\android-sdk
          ANDROID_NDK_HOME: C:\android-ndk-${{ env.NDK_VERSION }}

      # ---------- Загрузка артефакта ----------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mcpe-android-apk
          path: |
            **/*.apk
            **/outputs/**/*.apk
