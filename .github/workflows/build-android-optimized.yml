name: Ultimate MCPE Android Build

on:
  workflow_dispatch:          # ручной запуск
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ANDROID_HOME: C:\android-sdk
  ANDROID_NDK_HOME: C:\android-ndk-r14b
  GRADLE_USER_HOME: ~/.gradle

jobs:
  build:
    name: Build APK
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout репозитория
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. Установка JDK (нужен для keytool и javac)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. Кеширование NDK (r14b) – экономит время
      - name: Cache Android NDK r14b
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: C:\android-ndk-r14b
          key: ${{ runner.os }}-ndk-r14b-${{ hashFiles('**/Android.mk') }}
          restore-keys: |
            ${{ runner.os }}-ndk-r14b-

      - name: Download NDK r14b (if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-r14b-windows-x86_64.zip
          7z x ndk.zip -oC:\
          del ndk.zip

      # 4. Кеширование Android SDK (build-tools, платформы)
      - name: Cache Android SDK components
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: C:\android-sdk
          key: ${{ runner.os }}-sdk-${{ hashFiles('**/AndroidManifest.xml') }}
          restore-keys: |
            ${{ runner.os }}-sdk-

      - name: Install Android SDK (if not cached)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Создаём структуру каталогов
          New-Item -ItemType Directory -Force -Path "$env:ANDROID_HOME\cmdline-tools" | Out-Null

          # Скачиваем последнюю версию commandlinetools
          curl -L -o sdk-tools.zip https://dl.google.com/android/repository/commandlinetools-win-11076708_latest.zip
          7z x sdk-tools.zip -o"$env:ANDROID_HOME\cmdline-tools\" | Out-Null

          # Перемещаем в правильную структуру
          if (Test-Path "$env:ANDROID_HOME\cmdline-tools\cmdline-tools") {
              Move-Item "$env:ANDROID_HOME\cmdline-tools\cmdline-tools" "$env:ANDROID_HOME\cmdline-tools\latest" -Force
          }

          $sdkManager = "$env:ANDROID_HOME\cmdline-tools\latest\bin\sdkmanager.bat"
          if (-not (Test-Path $sdkManager)) {
              Write-Error "sdkmanager.bat not found!"
              exit 1
          }

          # Принимаем лицензии (автоматически yes)
          echo y | & $sdkManager --sdk_root="$env:ANDROID_HOME" --licenses 2>&1 | Out-Null

          # Устанавливаем нужные компоненты
          & $sdkManager --sdk_root="$env:ANDROID_HOME" "platform-tools" "platforms;android-29" "build-tools;35.0.0" 2>&1 | Out-Null

          Write-Host "Android SDK installed successfully."

      # 5. Проверка наличия build.ps1 (если отсутствует – создаём из шаблона)
      - name: Ensure build.ps1 exists
        shell: pwsh
        run: |
          if (-not (Test-Path ".\build.ps1")) {
              Write-Host "build.ps1 not found, creating from template..."
              # Можно встроить минимальную версию или скопировать из репозитория
              # Но мы предполагаем, что файл уже есть.
              # Для надёжности можно завершить с ошибкой.
              Write-Error "build.ps1 is required!"
              exit 1
          }

      # 6. Основная сборка (использует наш улучшенный build.ps1)
      - name: Build APK
        shell: pwsh
        run: .\build.ps1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}   # автоматически задаётся actions/setup-java

      # 7. Загрузка артефакта (APK)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mcpe-android-apk
          path: |
            build/apk/*.apk
            project/android/bin/*.apk   # на всякий случай
          if-no-files-found: error

      # 8. (Опционально) Вывод информации о сборке
      - name: Display build info
        run: |
          echo "Build completed at $(Get-Date)"
          Get-ChildItem build/apk -Recurse | Select-Object Name, Length, LastWriteTime
        shell: pwsh
