name: Android Build (Optimized)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ANDROID_HOME: ${{ github.workspace }}/android-sdk
  NDK_VERSION: r14b

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest   # Быстрее, чем Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ---------- Кеш NDK ----------
      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/android-ndk-${{ env.NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}

      - name: Download and extract NDK (if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p $ANDROID_HOME/ndk
          wget -q https://dl.google.com/android/repository/android-ndk-$NDK_VERSION-linux-x86_64.zip -O ndk.zip
          unzip -q ndk.zip -d $ANDROID_HOME/ndk
          rm ndk.zip

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/android-ndk-$NDK_VERSION" >> $GITHUB_ENV
          echo "$ANDROID_HOME/ndk/android-ndk-$NDK_VERSION" >> $GITHUB_PATH

      # ---------- Кеш Gradle (если есть) ----------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---------- Сборка ----------
      # Если в проекте есть gradlew – используем его (быстрее и надёжнее)
      - name: Build with Gradle
        if: hashFiles('gradlew') != ''
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --build-cache --parallel

      # Если нет gradlew – запускаем build.ps1 через PowerShell Core
      - name: Build with PowerShell script
        if: hashFiles('gradlew') == ''
        shell: pwsh
        run: |
          .\build.ps1

      # ---------- Загрузка артефакта ----------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mcpe-android-apk
          path: |
            **/*.apk
            **/outputs/**/*.apk
