name: Android Build (Windows, Optimized)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ANDROID_HOME: C:\android-sdk
  NDK_VERSION: r14b

jobs:
  build:
    name: Build APK
    runs-on: windows-latest   # Оригинальный скрипт рассчитан на Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ---------- Кеш NDK ----------
      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: C:\android-ndk-${{ env.NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}

      - name: Download and extract NDK (if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -L -o ndk.zip https://dl.google.com/android/repository/android-ndk-$env:NDK_VERSION-windows-x86_64.zip
          mkdir C:\android-ndk-$env:NDK_VERSION
          7z x ndk.zip -oC:\
          del ndk.zip
        shell: pwsh

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=C:\android-ndk-$env:NDK_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "C:\android-ndk-$env:NDK_VERSION" | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      # ---------- Кеш Gradle (если используется) ----------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~\.gradle\caches
            ~\.gradle\wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---------- Сборка ----------
      - name: Build with PowerShell script
        shell: pwsh
        run: |
          .\build.ps1
        env:
          ANDROID_HOME: C:\android-sdk
          ANDROID_NDK_HOME: C:\android-ndk-${{ env.NDK_VERSION }}

      # ---------- Загрузка артефакта ----------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mcpe-android-apk
          path: |
            **/*.apk
            **/outputs/**/*.apk
